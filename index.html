<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japanese Vocabulary Flashcards</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">単語 Flashcards</div>
    <div class="top-actions">
      <button class="icon-btn" id="themeBtn" title="Đổi nền">◐</button>
    </div>
  </header>

  <section class="intro">
    <h1>Học từ vựng Nhật</h1>
    <p>Luyện từ vựng bằng flashcard, nghe audio, trộn thẻ và học tự động theo từng bài.</p>
  </section>

  <section class="filter-section">
    <div class="filter-label">Bài học</div>
    <nav class="filters lesson-filters" id="lessonFilters">
    </nav>

    <section class="vocab-panel" id="vocabPanel">
      <div class="vocab-toggle" id="vocabToggle" aria-expanded="true">
        <span class="vocab-title" id="vocabTitle">Từ vựng</span>
        <span class="vocab-meta" id="vocabMeta">0 từ</span>
      </div>
      <div class="vocab-content" id="vocabContent"></div>
    </section>
  </section>

  <div class="footer">Chọn bài học để luyện đúng nhóm từ bạn cần.</div>
</div>
<div class="toast" id="toast"></div>

<script src="./assets/app.js" defer></script>
</body>
</html>
