<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japanese Vocabulary Flashcards</title>
  <link rel="stylesheet" href="./assets/styles.css" />
  <link rel="stylesheet" href="./assets/theme.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">単語 Flashcards</div>
    <div class="top-actions">
      <button class="icon-btn" id="settingsBtn" type="button" title="Settings" aria-label="Open settings" aria-haspopup="dialog" aria-expanded="false">⚙</button>
      <button class="icon-btn" id="themeBtn" title="Toggle theme">◐</button>
      <div class="settings-popover" id="settingsPopover" role="dialog" aria-modal="false" aria-labelledby="settingsTitle" hidden>
        <div class="settings-header">
          <h2 id="settingsTitle">Settings</h2>
          <button class="settings-close-btn" id="settingsCloseBtn" type="button" aria-label="Close settings">×</button>
        </div>
        <div class="settings-section">
          <div>
            <div class="drive-title">Google Drive</div>
            <div class="drive-status" id="driveStatus">Local only</div>
          </div>
          <div class="drive-actions">
            <button class="study-secondary-btn" id="connectDriveBtn" type="button">Connect Drive</button>
            <button class="study-secondary-btn" id="syncDriveBtn" type="button" hidden>Sync Now</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <section class="study-dashboard" id="studyDashboard" aria-label="Today's study">
    <div class="today-hero">
      <div class="today-copy">
        <div class="study-dashboard-label">今日の学習 · Today</div>
        <p id="todayMessage">Your next study session is being prepared.</p>
        <div class="today-actions">
          <button class="study-primary-btn" id="startDailyReviewBtn" type="button" disabled>Start Today’s Study</button>
          <button class="study-secondary-btn" id="browseLessonsBtn" type="button">Browse Lessons</button>
        </div>
      </div>
    </div>
    <div class="study-metrics" id="srsDashboardStats">
      <div class="study-metric"><strong id="dueCount">–</strong><span>Due</span></div>
      <div class="study-metric"><strong id="newCount">–</strong><span>New today</span></div>
      <div class="study-metric"><strong id="learningCount">–</strong><span>Learning</span></div>
      <div class="study-metric"><strong id="matureCount">–</strong><span>Mature</span></div>
    </div>
  </section>

  <section class="daily-review-section" id="dailyReviewSection" hidden>
    <div id="dailyReviewContent"></div>
  </section>

  <dialog class="sync-reminder-dialog" id="syncReminderDialog" aria-labelledby="syncReminderTitle">
    <form method="dialog">
      <div class="study-dashboard-label">Before your review</div>
      <h2 id="syncReminderTitle">Sync your latest progress?</h2>
      <p>Syncing first prevents words reviewed on another device from appearing as new here.</p>
      <div class="sync-reminder-actions">
        <button class="study-secondary-btn" id="continueOfflineBtn" type="submit" value="offline">Continue offline</button>
        <button class="study-primary-btn" id="syncBeforeReviewBtn" type="button">Sync first</button>
      </div>
    </form>
  </dialog>
  <section class="filter-section" id="lessonStudySection">
    <div class="study-selectors">
      <label class="study-selector">
        <span>Lesson</span>
        <select class="study-select" id="lessonSelect" aria-label="Choose lesson"></select>
      </label>
      <label class="study-selector">
        <span>Set</span>
        <select class="study-select" id="vocabSetSelect" aria-label="Choose vocabulary set" disabled>
          <option>None</option>
        </select>
      </label>
    </div>

    <section class="vocab-panel" id="vocabPanel">
      <div class="vocab-toggle" id="vocabToggle" aria-expanded="true">
        <span class="vocab-title" id="vocabTitle">Vocabulary</span>
        <span class="vocab-meta" id="vocabMeta">0 words</span>
      </div>
      <div class="vocab-content" id="vocabContent"></div>
    </section>
  </section>
</div>
<div class="toast" id="toast"></div>

<script src="./assets/config.js"></script>
<script src="./assets/srs.js"></script>
<script src="./assets/srs-db.js"></script>
<script src="https://accounts.google.com/gsi/client" async></script>
<script src="./assets/app.js" defer></script>
</body>
</html>
